<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cavaleiros do Zodíaco</title>
    <link rel="stylesheet" href="main.css">
</head>

<body>
    <header>
        <img src="assets/CavaleirosOuro.png">
        <div class="tituloHeader">
            <h1>Cavaleiros do Zodíaco - O Resgate de Atena!</h1>
            <img src="assets/CavaleirosBronze.png">
        </div>
        <img id="imgAthena" src="assets/Athena.png">
    </header>
    <main>
        <div class="rowBotoes">
            <button class="buttonMenu" id="playButton">Iniciar</button>
            <button class="buttonMenu" id="configButton">Configurações</button>
        </div>
        <div id="containerMatriz">
            <div id="botaoSimulacao"></div>
            <div id="displayTimer"></div>
            <div id="botaoRecomecar"></div>
            <div id="containerMapaECavaleiros">
                <div id="historicoEventos"></div>
                <div id="matrizMapa"></div>
                <div id="situacaoCavaleiros"></div>
            </div>

        </div>
    </main>
    <script src="game.js"></script>
</body>

</html>
